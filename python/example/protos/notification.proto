syntax = "proto3";

package notification;

service NotificationService {
  rpc SendNotification (SendRequest) returns (SendReply);
  rpc GetStatus (StatusRequest) returns (StatusReply);
  rpc RenderTemplate (RenderRequest) returns (RenderReply);
}

message SendRequest {
  string recipient = 1;
  string channel = 2;       // email, sms, push
  string template_id = 3;
  map<string, string> variables = 4;
}

message SendReply {
  string notification_id = 1;
  string status = 2;        // queued, sent, failed
}

message StatusRequest {
  string notification_id = 1;
}

message StatusReply {
  string notification_id = 1;
  string status = 2;
  string delivered_at = 3;
}

message RenderRequest {
  string template_id = 1;
  map<string, string> variables = 2;
}

message RenderReply {
  string rendered_body = 1;
  string subject = 2;
}
