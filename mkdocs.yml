site_name: StaffOps — OTel Libs
site_description: Standardized OpenTelemetry instrumentation libraries for .NET, Python, and Go
site_url: https://staffops.github.io/otel-libs/
repo_url: https://github.com/StaffOps/staffops-otel-libs
repo_name: StaffOps/otel-libs
edit_uri: edit/main/docs/site/

docs_dir: docs/site

theme:
  name: material
  custom_dir: docs/site/overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  language: en

nav:
  - Home: index.md
  - .NET:
      - Overview: dotnet/README.md
      - HOW-TO Guide: dotnet/HOW-TO.md
      - Tests: dotnet/TESTS.md
      - Example Apps: dotnet/example/README.md
      - Example Details: dotnet/example/EXAMPLES.md
  - Python:
      - Overview: python/README.md
      - HOW-TO Guide: python/HOW-TO.md
      - Tests: python/TESTS.md
      - Example Apps: python/example/README.md
      - Example Details: python/example/EXAMPLES.md
  - Go:
      - Overview: go/README.md
      - HOW-TO Guide: go/HOW-TO.md
      - Example Apps: go/example/README.md
  - Consuming Packages: CONSUMING.md
  - Changelog: CHANGELOG.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/StaffOps
  generator: false

copyright: Copyright &copy; StaffOps Contributors — Apache 2.0
